<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>背單字小工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Inline Tailwind config for the CDN build (semantic dark glossy theme)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#0b1220',
            card: '#0f1724',
            accent: '#7c3aed',
            muted: '#94a3b8',
            'on-surface': '#e6eef8',
            border: 'rgba(255,255,255,0.06)',
            gloss: 'rgba(255,255,255,0.04)'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-surface text-on-surface antialiased">
  <header>
    <h1 class="text-lg font-semibold">背單字小工具</h1>
    <nav class="flex items-center">
      <button id="btn-home" class="ml-2 px-3 py-2 rounded-lg bg-card border border-border text-on-surface hover:bg-accent/10">練習</button>
      <button id="btn-manage" class="ml-2 px-3 py-2 rounded-lg bg-card border border-border text-on-surface hover:bg-accent/10">管理單字</button>
    </nav>
  </header>

  <main>
    <section id="view-home" class="py-6">
      <div class="controls flex justify-center mb-4">
        <button id="prev" class="mx-2 px-3 py-2 rounded-lg bg-card border border-border text-on-surface">上一個</button>
        <button id="random" class="mx-2 px-3 py-2 rounded-lg bg-card border border-border text-on-surface">隨機</button>
        <button id="next" class="mx-2 px-3 py-2 rounded-lg bg-card border border-border text-on-surface">下一個</button>
      </div>

      <div class="card-container flex justify-center">
        <div class="card group relative" id="card">
          <div class="side front" id="card-front">
            <div class="flex flex-col items-center">
              <div>Word</div>
              <div class="mt-2 text-sm text-muted card-hint opacity-0 group-hover:opacity-100 transition-opacity duration-300">點擊翻頁</div>
            </div>
          </div>
          <div class="side back" id="card-back">
            <div class="w-full">
              <h2 id="back-word" class="text-xl font-semibold mb-2"></h2>
              <p class="mb-2"><strong>翻譯：</strong><span id="back-translation" class="text-2xl font-semibold"></span></p>
              <p class="mb-1"><strong>詞性：</strong><span id="back-pos"></span></p>
              <p class="mb-1"><strong>例句：</strong><span id="back-example"></span></p>
              <p class="mb-1"><strong>字根/來源：</strong><span id="back-etymology"></span></p>
              <div class="mt-3 text-sm text-muted card-hint opacity-0 group-hover:opacity-100 transition-opacity duration-300">點擊翻頁</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="view-manage" class="hidden py-6">
      <h2 class="text-xl font-semibold mb-4">管理單字</h2>
      <form id="word-form" class="grid gap-3 max-w-2xl">
        <label class="flex flex-col">英文單字<input type="text" id="input-word" required class="mt-1 px-3 py-2 rounded-lg bg-card border border-border text-on-surface"></label>
        <label class="flex flex-col">翻譯<input type="text" id="input-translation" class="mt-1 px-3 py-2 rounded-lg bg-card border border-border text-on-surface"></label>
        <label class="flex flex-col">詞性<input type="text" id="input-pos" class="mt-1 px-3 py-2 rounded-lg bg-card border border-border text-on-surface"></label>
        <label class="flex flex-col">例句<input type="text" id="input-example" class="mt-1 px-3 py-2 rounded-lg bg-card border border-border text-on-surface"></label>
        <label class="flex flex-col">字根/來源<input type="text" id="input-etymology" class="mt-1 px-3 py-2 rounded-lg bg-card border border-border text-on-surface"></label>
        <div class="form-actions flex gap-3">
          <button type="button" id="btn-autofill" class="px-3 py-2 rounded-lg bg-accent text-white">自動填入</button>
          <button type="submit" class="px-3 py-2 rounded-lg bg-card border border-border text-on-surface">儲存單字</button>
        </div>
      </form>

      <h3 class="mt-6 mb-2 text-lg font-medium">已儲存單字</h3>
      <ul id="words-list" class="space-y-2"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
