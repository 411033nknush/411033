<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>背單字小工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>背單字小工具</h1>
    <nav>
      <button id="btn-home">練習</button>
      <button id="btn-manage">管理單字</button>
    </nav>
  </header>

  <main>
    <section id="view-home">
      <div class="controls">
        <button id="prev">上一個</button>
        <button id="random">隨機</button>
        <button id="next">下一個</button>
      </div>

      <div class="card-container">
        <div class="card" id="card">
          <div class="side front" id="card-front">Word</div>
          <div class="side back" id="card-back">
            <h2 id="back-word"></h2>
            <p><strong>翻譯：</strong><span id="back-translation"></span></p>
            <p><strong>詞性：</strong><span id="back-pos"></span></p>
            <p><strong>例句：</strong><span id="back-example"></span></p>
            <p><strong>字根/來源：</strong><span id="back-etymology"></span></p>
          </div>
        </div>
      </div>
    </section>

    <section id="view-manage" class="hidden">
      <h2>管理單字</h2>
      <form id="word-form">
        <label>英文單字<input type="text" id="input-word" required></label>
        <label>翻譯<input type="text" id="input-translation"></label>
        <label>詞性<input type="text" id="input-pos"></label>
        <label>例句<input type="text" id="input-example"></label>
        <label>字根/來源<input type="text" id="input-etymology"></label>
        <div class="form-actions">
          <button type="button" id="btn-autofill">自動填入</button>
          <button type="submit">儲存單字</button>
        </div>
      </form>

      <h3>已儲存單字</h3>
      <ul id="words-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
